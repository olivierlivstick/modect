[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173", "http://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false   # mettre true en production

[auth.sms]
enable_signup = false

[functions.initiate-call]
verify_jwt = false   # auth gérée en interne via admin client

[functions.realtime-agent]
verify_jwt = true

[functions.generate-summary]
verify_jwt = true

[functions.schedule-calls]
verify_jwt = false   # appelé par le cron Supabase

[functions.livekit-webhook]
verify_jwt = false   # webhook externe (signature vérifiée manuellement)
